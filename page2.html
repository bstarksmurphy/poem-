<head>
<title> the rays through eyelids</title>
  <style>
  canvas{
    position:absolute; 
    top: 0px;
    left: 0px;
    pointer-events: none;
    } 
  
  </style>
</head>


<body style="background: #f59733;
background: radial-gradient(circle, rgba(245, 151, 51, 1) 0%, rgba(237, 60, 28, 1) 100%);">
  
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.10.0/p5.min.js"></script>
<script>
  /* global p5 */
   let rectX=0;
   let rectY= 0;
  
  let recX= 500;
  let recY= 0;
 function setup(){
   createCanvas(1500,1250);

 }
function draw(){
  background(245, 1);
  blendMode(SCREEN);
  frameRate(4);
  
  rectX = rectX+ 20;
  rectY = rectY+10;
  stroke(0);
  fill(230, 230, 230);
  rect(rectX,rectY, 20,20);
  
  recX = recX+10;
  recY = recY+10;
  stroke(0);
  fill(230, 230, 230);
  rect(recX,recY, 100,50);
      
}
</script>


</body>
