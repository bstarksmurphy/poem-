<body style="background: #f59733;
background: radial-gradient(circle, rgba(245, 151, 51, 1) 0%, rgba(237, 60, 28, 1) 100%);">
  
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.10.0/p5.min.js"></script>
<script>
  /* global p5 */
   let rectX=0;
   let rectY= 100;
 function setup(){
   createCanvas(screenX,screenY);

 }
function draw(){
  background(245, 1);
  blendMode(OVERLAY);
  frameRate(4);
  rectX = rectX+1;
  stroke(0);
  fill(230, 230, 230);
  rect(rectX,rectY, 20,900);
      
}
</script>
